version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama

    ports:
      - "11434:11434"

    restart: unless-stopped

volumes:
  qdrant_storage: